name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build # build first: the CLI's typecheck/tests import the core's built types
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      # Publishes @mntglobal/vibecheck-core then @mntglobal/vibecheck (workspace:* → real versions).
      - name: Publish to npm
        if: env.HAS_NPM_TOKEN == 'true'
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Publish skipped (no NPM_TOKEN)
        if: env.HAS_NPM_TOKEN != 'true'
        run: echo "::warning::NPM_TOKEN secret is not set — build verified but publish was skipped. Add the repo secret NPM_TOKEN and re-run this workflow to publish."
