name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build # build first: the CLI's typecheck/tests import the core's built types
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      # Dogfood: vibecheck must score its own repository clean.
      - run: node packages/cli/dist/index.js . --ci --min-grade A
